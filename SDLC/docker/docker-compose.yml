services:

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:10.0
    ports:
      - "18888:18888"
      - "18889:18889"
    environment:
      DASHBOARD__OTLP__AUTHMODE: Unsecured
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  app:
    build:
      context: ../src/SDLC.Dashboard
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://aspire-dashboard:18889
      SWEAF__BaseUrl: ${SWEAF__BaseUrl}
      ConnectionStrings__ArtifactDb: Data Source=/data/artifacts.db
      ArtifactStore__BasePath: /data/artifacts
      Slack__BaseUrl: ${SLACK_BASE_URL}
      Dashboard__BaseUrl: ${DASHBOARD_BASE_URL:-http://localhost:8080}
    volumes:
      - artifact-data:/data
    depends_on:
      aspire-dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data/caddy
    environment:
      SDLC_DOMAIN: ${SDLC_DOMAIN:-localhost}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  artifact-data:
  caddy-data:
